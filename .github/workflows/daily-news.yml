name: 毎朝のAI・きゅうり栽培ニュース配信

on:
  schedule:
    # 毎朝 07:00 JST (= 22:00 UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  deliver-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: daily_news/requirements.txt

      - name: 依存パッケージをインストール
        run: pip install -r daily_news/requirements.txt

      - name: ニュース配信を実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: daily_news
        run: python news_delivery.py

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-log-${{ github.run_id }}
          path: daily_news/logs/
          retention-days: 30
